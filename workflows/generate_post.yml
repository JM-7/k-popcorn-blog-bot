name: Generate Blog Post Draft

on:
  workflow_dispatch:
  schedule:
    # 매일 KST 09:00 (UTC 00:00) 실행
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate post (write to posts/)
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Seoul
        run: python -m src.main generate

      - name: Commit and push generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "Add auto-generated post draft [skip ci]"
          git push

      # commit/push까지 성공한 경우에만 카카오 알림 발송.
      # (먼저 알림부터 보내면, push 실패 시 "글은 없는데 알림만 온" 상황이 생길 수 있음)
      - name: Send Kakao notification
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          POST_CATEGORY: ${{ steps.generate.outputs.category }}
          POST_TITLE: ${{ steps.generate.outputs.title }}
          POST_SUMMARY: ${{ steps.generate.outputs.summary }}
          POST_RELATIVE_PATH: ${{ steps.generate.outputs.relative_path }}
        run: python -m src.main notify
